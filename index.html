<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nippard 12-Week Program</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--sf:#151515;--bd:#252525;--ac:#c8f542;--mu:#555;--tx:#e8e8e8;--td:#888;--db:#101a00;--dd:rgba(200,245,66,.25);--ib:#1c1c1c;--ca:#1a1a2e;--cb:#2a2a50;--cc:#7b8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;}
.app-header{padding:24px 16px 0;max-width:780px;margin:0 auto;}
.ptag{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);letter-spacing:.15em;border:1px solid var(--ac);padding:3px 8px;border-radius:2px;display:inline-block;margin-bottom:8px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,9vw,56px);line-height:.88;letter-spacing:.02em;margin-bottom:16px;}
h1 span{color:var(--ac);}
.app-nav{display:flex;gap:6px;padding:0 16px 12px;max-width:780px;margin:0 auto;}
.nav-btn{padding:8px 16px;border-radius:5px;border:1px solid var(--bd);background:var(--sf);color:var(--td);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;cursor:pointer;transition:all .15s;}
.nav-btn:hover{border-color:var(--mu);color:var(--tx);}
.nav-btn.active{background:var(--ac);border-color:var(--ac);color:#000;font-weight:700;}
.wk-bar,.day-bar{display:flex;overflow-x:auto;scrollbar-width:none;gap:4px;padding:0 16px 10px;max-width:780px;margin:0 auto;}
.day-bar{position:sticky;top:0;z-index:50;background:var(--bg);padding-top:6px;}
.wk-bar::-webkit-scrollbar,.day-bar::-webkit-scrollbar{display:none;}
.wk-btn,.day-btn{flex-shrink:0;padding:6px 11px;border-radius:4px;border:1px solid var(--bd);background:var(--sf);color:var(--td);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;cursor:pointer;transition:all .15s;white-space:nowrap;}
.wk-btn:hover,.day-btn:hover{border-color:var(--mu);color:var(--tx);}
.wk-btn.active,.day-btn.active{background:var(--ac);border-color:var(--ac);color:#000;font-weight:700;}
.day-btn.rest{opacity:.4;cursor:default;}
.day-btn.has-cardio::after{content:'🏃';font-size:8px;margin-left:3px;}
.wk-panel{display:none;}.wk-panel.active{display:block;}
.day-panel{display:none;padding:0 16px 80px;max-width:780px;margin:0 auto;}
.day-panel.active{display:block;}
.pl{font-family:'DM Mono',monospace;font-size:10px;color:var(--td);margin-bottom:6px;display:flex;justify-content:space-between;}
.pl span{color:var(--ac);}
.pb-wrap{background:var(--bd);height:3px;border-radius:2px;margin-bottom:18px;overflow:hidden;}
.pb{height:100%;background:var(--ac);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%;}
.dh{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.05em;color:var(--td);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--bd);}
.dh span{color:var(--ac);}
.ex-list{display:flex;flex-direction:column;gap:6px;}
.ex-card{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:13px 15px;position:relative;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;transition:border-color .2s,background .2s;}
.ex-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--mu);transition:background .25s;}
.ex-card.done{background:var(--db);border-color:var(--dd);}
.ex-card.done::before{background:var(--ac);}
.ex-card.done .ex-name{color:var(--td);text-decoration:line-through;text-decoration-color:var(--mu);}
.ct{display:flex;align-items:center;gap:10px;cursor:pointer;}
.cc{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--mu);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;}
.ex-card.done .cc{background:var(--ac);border-color:var(--ac);}
.cc svg{opacity:0;transition:opacity .15s;}
.ex-card.done .cc svg{opacity:1;}
.ex-name{font-size:13px;font-weight:500;flex:1;line-height:1.3;transition:color .2s;}
.ib{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:20px;background:rgba(200,245,66,.08);color:var(--ac);border:1px solid rgba(200,245,66,.2);white-space:nowrap;flex-shrink:0;}
.cm{display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);flex-wrap:wrap;}
.mi{display:flex;flex-direction:column;gap:2px;}
.ml{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
.mv{font-size:12px;font-weight:500;}
.ex-card.done .mv{color:var(--td);}
.it{display:flex;align-items:center;gap:6px;margin-top:9px;cursor:pointer;width:fit-content;}
.itl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;transition:color .15s;}
.it:hover .itl{color:var(--td);}
.ita{font-size:9px;color:var(--mu);transition:transform .2s;}
.it.open .ita{transform:rotate(180deg);}
.ip{display:none;margin-top:7px;padding:9px 11px;background:#111;border-radius:5px;border:1px solid #1e1e1e;}
.ip.open{display:block;}
.ir{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.ic{display:flex;flex-direction:column;gap:2px;padding:5px 9px;border-radius:4px;background:#181818;border:1px solid #222;flex:1;min-width:72px;}
.icl{font-family:'DM Mono',monospace;font-size:7px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
.icv{font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);font-weight:500;}
.icv.rpe{color:#f0a500;}
.icv.rv{color:var(--cc);}
.sr{display:flex;flex-direction:column;gap:4px;}
.sl{font-family:'DM Mono',monospace;font-size:7px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.sc{display:block;width:100%;text-align:left;padding:5px 9px;border-radius:4px;background:#181818;border:1px solid #222;font-family:'DM Mono',monospace;font-size:10px;color:var(--td);cursor:pointer;transition:all .15s;}
.sc:hover{border-color:var(--mu);color:var(--tx);}
.sc.sa{background:rgba(200,245,66,.1);border-color:var(--ac);color:var(--ac);}
.stag{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(123,140,255,.2);border:1px solid var(--cc);color:var(--cc);vertical-align:middle;margin-left:5px;}
.ss{margin-top:10px;}
.ss+.ss{margin-top:8px;}
.ssl{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.set-row{display:grid;grid-template-columns:16px 1fr 1fr 28px;align-items:center;gap:5px;margin-bottom:3px;}
.sn{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);text-align:center;}
.siw{display:flex;flex-direction:column;gap:1px;}
.sil{font-family:'DM Mono',monospace;font-size:7px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;}
.si{background:var(--ib);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;padding:4px 6px;width:100%;outline:none;transition:border-color .15s;}
.si::placeholder{color:#2e2e2e;}
.si:focus{border-color:var(--ac);}
.sch{width:28px;height:28px;border-radius:4px;border:1.5px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,transform .1s;flex-shrink:0;}
.sch:hover{border-color:var(--ac);transform:scale(1.08);}
.sch.logged{background:var(--ac);border-color:var(--ac);}
.wu-row .sch.logged{background:#3a5a00;border-color:#6aaa00;}
.wu-row .sch.logged svg path{stroke:var(--ac);}
.sum{display:grid;grid-template-columns:16px 1fr 24px;align-items:center;gap:5px;margin-bottom:3px;}
.sumtx{font-family:'DM Mono',monospace;font-size:11px;color:var(--td);}
.sumtx strong{color:var(--ac);font-weight:500;}
.eb{width:24px;height:24px;border-radius:4px;border:1px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:11px;transition:border-color .15s;}
.eb:hover{border-color:var(--mu);}
.note-row{margin-top:1px;margin-bottom:3px;padding-left:21px;}
.ni{background:transparent;border:none;border-bottom:1px solid #1e1e1e;color:var(--td);font-family:'DM Mono',monospace;font-size:10px;padding:2px 4px;width:100%;outline:none;transition:border-color .15s;}
.ni::placeholder{color:#2a2a2a;}
.ni:focus{border-bottom-color:var(--mu);}
.sum-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);font-style:italic;margin-top:1px;padding-left:21px;}
.cds{margin-top:18px;}
.cdhr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cdtitle{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.15em;text-transform:uppercase;}
.cdcnt{font-family:'DM Mono',monospace;font-size:9px;color:var(--td);}
.cdcnt strong{color:var(--cc);}
.cdc{border-radius:6px;border:1px solid var(--cb);background:var(--ca);overflow:hidden;position:relative;transition:border-color .2s,background .2s;}
.cdc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cb);transition:background .25s;}
.cdc.on{background:#12122a;border-color:var(--cc);}
.cdc.on::before{background:var(--cc);}
.cdc.cdn{background:#0a120a;border-color:rgba(200,245,66,.3);}
.cdc.cdn::before{background:var(--ac);}
.cdtr{display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer;}
.cdpill{width:40px;height:22px;border-radius:11px;background:#1e1e1e;border:1.5px solid var(--cb);position:relative;flex-shrink:0;transition:background .2s,border-color .2s;}
.cdpill::after{content:'';position:absolute;left:3px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--mu);transition:transform .2s,background .2s;}
.cdc.on .cdpill{background:#1c1c3a;border-color:var(--cc);}
.cdc.on .cdpill::after,.cdc.cdn .cdpill::after{transform:translateX(17px);}
.cdc.cdn .cdpill{background:var(--db);border-color:var(--ac);}
.cdc.on .cdpill::after{background:var(--cc);}
.cdc.cdn .cdpill::after{background:var(--ac);}
.cdlbl{flex:1;}
.cdtl{font-size:13px;font-weight:500;color:var(--td);transition:color .2s;}
.cdc.on .cdtl{color:var(--tx);}
.cdsub{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);margin-top:2px;}
.cdbody{display:none;padding:0 13px 13px;}
.cdc.on .cdbody,.cdc.cdn .cdbody{display:block;}
.cdtypes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.cdchip{padding:4px 9px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--td);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .15s;}
.cdchip:hover{border-color:var(--cc);color:var(--tx);}
.cdchip.sel{background:rgba(123,140,255,.15);border-color:var(--cc);color:var(--cc);}
.cdfields{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.cdf{display:flex;flex-direction:column;gap:2px;}
.cdfl{font-family:'DM Mono',monospace;font-size:7px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
.cdi{background:var(--ib);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;padding:5px 7px;width:100%;outline:none;transition:border-color .15s;}
.cdi::placeholder{color:#2e2e2e;}
.cdi:focus{border-color:var(--cc);}
.cdinf{grid-column:1/-1;}
.cddb{width:100%;padding:8px;border-radius:5px;background:var(--cc);color:#000;border:none;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.08em;cursor:pointer;transition:opacity .15s;margin-top:5px;}
.cddb:hover{opacity:.85;}
.cddb.comp{background:var(--ac);}
.df{margin-top:20px;display:flex;flex-direction:column;gap:6px;}
.ca-btn{width:100%;padding:12px;background:var(--ac);color:#000;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.1em;cursor:pointer;transition:opacity .2s;}
.ca-btn:hover{opacity:.9;}
.rb{width:100%;padding:8px;background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;cursor:pointer;transition:color .2s,border-color .2s;}
.rb:hover{color:var(--td);border-color:var(--mu);}
.cong{display:none;text-align:center;padding:18px;margin-top:16px;border:1px solid var(--dd);border-radius:6px;background:var(--db);}
.cong.show{display:block;}
.cong-t{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ac);letter-spacing:.05em;}
.cong p{color:var(--td);font-size:12px;margin-top:4px;font-family:'DM Mono',monospace;}
.rest-p{text-align:center;padding:50px 16px;}
.rest-p .ri{font-size:42px;margin-bottom:12px;}
.rest-p h2{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--td);letter-spacing:.05em;}
.rest-p p{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);margin-top:5px;}
#timer{display:none;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:999;background:#111;border:1px solid var(--ac);border-radius:12px;padding:12px 20px;text-align:center;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
#timer.vis{display:block;}
.tl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;}
.td2{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--ac);line-height:1;letter-spacing:.05em;}
.td2.urg{color:#e05555;}
.tex{font-family:'DM Mono',monospace;font-size:9px;color:var(--td);margin-top:2px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbtns{display:flex;gap:5px;margin-top:8px;}
.tbtn{flex:1;padding:5px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--td);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--mu);color:var(--tx);}
.tbtn.sk{background:var(--ac);border-color:var(--ac);color:#000;font-weight:700;}
#pview{display:none;padding:0 16px 80px;max-width:780px;margin:0 auto;}
#pview.active{display:block;}
.pvh{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.05em;color:var(--td);padding-bottom:7px;border-bottom:1px solid var(--bd);}
.pvh span{color:var(--ac);}
.pvtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.exp-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:5px;border:1px solid var(--bd);background:var(--sf);color:var(--td);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .15s;}
.exp-btn:hover{border-color:var(--ac);color:var(--ac);}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:14px 0;}
@media(max-width:480px){.sg{grid-template-columns:repeat(2,1fr);}}
.sc2{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;}
.sc2l{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.sc2v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--ac);line-height:1;}
.sc2s{font-family:'DM Mono',monospace;font-size:9px;color:var(--td);margin-top:2px;}
.psh{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.13em;text-transform:uppercase;margin:18px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px;}
.psh span{color:var(--td);}
.dfilter{display:flex;overflow-x:auto;scrollbar-width:none;gap:4px;margin-bottom:16px;}
.dfilter::-webkit-scrollbar{display:none;}
.dfb{flex-shrink:0;padding:5px 11px;border-radius:4px;border:1px solid var(--bd);background:var(--sf);color:var(--td);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .15s;}
.dfb:hover{border-color:var(--mu);color:var(--tx);}
.dfb.active{background:var(--ac);border-color:var(--ac);color:#000;font-weight:700;}
.peb{margin-bottom:24px;}
.pen{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pebadge{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);padding:2px 5px;border:1px solid var(--bd);border-radius:3px;}
.ptw{overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;border-radius:6px;border:1px solid var(--bd);}
.ptw::-webkit-scrollbar{height:3px;}
.ptw::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.pt{border-collapse:collapse;width:100%;min-width:660px;}
.pt th{background:#111;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;}
.pt th.wth{text-align:center;min-width:84px;}
.pt td{padding:5px 8px;border-bottom:1px solid #1a1a1a;vertical-align:top;}
.pt tr:last-child td{border-bottom:none;}
.pt tr:hover td{background:#111;}
.psl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.06em;}
.pc{text-align:center;}
.pe{font-family:'DM Mono',monospace;font-size:11px;color:var(--td);line-height:1.5;text-align:center;}
.pe.hd{color:var(--tx);}
.pe .pw{color:var(--ac);font-weight:500;}
.pe .pr2{color:var(--td);}
.pe.em{color:#2a2a2a;}
.prb{display:inline-block;font-family:'DM Mono',monospace;font-size:7px;background:rgba(200,245,66,.15);color:var(--ac);border:1px solid rgba(200,245,66,.3);border-radius:3px;padding:1px 4px;margin-left:2px;vertical-align:middle;}
.vr td{background:#0d1500;}
.vr .pe.hd{color:#8fc033;}
.er td{background:#150d00;}
.er .pe.hd{color:#f0a500;}
.cpill{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid var(--bd);color:var(--td);}
.cpill.g{border-color:rgba(200,245,66,.4);color:var(--ac);background:rgba(200,245,66,.06);}
.cpill.m{border-color:rgba(240,165,0,.4);color:#f0a500;background:rgba(240,165,0,.06);}
.cpill.l{border-color:rgba(200,50,50,.4);color:#e05555;background:rgba(200,50,50,.06);}
.cdtype{font-size:11px;color:var(--cc);}
.cddur{font-family:'DM Mono',monospace;font-size:10px;color:var(--td);}
.cdem{font-family:'DM Mono',monospace;font-size:11px;color:#2a2a2a;text-align:center;}
.bwg{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:4px;}
@media(max-width:480px){.bwg{grid-template-columns:repeat(4,1fr);}}
.bwc{background:var(--sf);border:1px solid var(--bd);border-radius:5px;padding:6px 7px;text-align:center;}
.bwcl{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:.06em;margin-bottom:3px;}
.bwi{background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--ac);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;width:100%;text-align:center;outline:none;padding:2px 0;transition:border-color .15s;}
.bwi::placeholder{color:#2a2a2a;}
.bwi:focus{border-bottom-color:var(--ac);}
.bwu{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);}
.nd{text-align:center;padding:36px 16px;color:var(--mu);font-family:'DM Mono',monospace;font-size:11px;}
.nd span{display:block;font-size:26px;margin-bottom:7px;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.jp{animation:pop .3s ease;}
</style>
</head>
<body>
<div id="timer">
  <div class="tl">REST TIMER</div>
  <div class="td2" id="tdis">0:00</div>
  <div class="tex" id="tex"></div>
  <div class="tbtns">
    <button class="tbtn" onclick="addT(-15)">−15s</button>
    <button class="tbtn" onclick="addT(15)">+15s</button>
    <button class="tbtn sk" onclick="stopT()">DONE</button>
  </div>
</div>
<div class="app-header">
  <div class="ptag">JEFF NIPPARD — BODYBUILDING TRANSFORMATION</div>

panel.addEventListener('click',e=>{const it=e.target.closest('.it');if(it){it.classList.toggle('open');const ip=it.nextElementSibling;if(ip?.classList.contains('ip'))ip.classList.toggle('open');return;}const sc=e.target.closest('.sc');if(sc){const{key:k,ei,sub}=sc.dataset;const eiN=parseInt(ei);ST[k].sub[eiN]=sub==='orig'?null:sub;const wasOpen=sc.closest('.ip')?.classList.contains('open');reCard(k,day,eiN,panel);if(wasOpen){const nc=panel.querySelectorAll('.ex-card')[eiN];nc?.querySelector('.it')?.classList.add('open');nc?.querySelector('.ip')?.classList.add('open');}return;}const ct=e.target.closest('.ct');if(ct){togDone(ct.dataset.key,parseInt(ct.dataset.ei),day,panel);return;}const sch=e.target.closest('.sch');if(sch){doLog(sch.dataset.key,parseInt(sch.dataset.ei),sch.dataset.type,parseInt(sch.dataset.si),panel,day);return;}const eb=e.target.closest('.eb');if(eb){unlog(eb.dataset.key,parseInt(eb.dataset.ei),eb.dataset.type,parseInt(eb.dataset.si),day,panel);return;}const cab=e.target.closest('.ca-btn');if(cab){compAll(cab.dataset.key,day,panel);return;}const rb=e.target.closest('.rb');if(rb){resetDay(rb.dataset.key,day,panel);return;}const cdtr=e.target.closest('.cdtr');if(cdtr){togCD(cdtr.dataset.key,week.week,panel);return;}const cdc=e.target.closest('.cdchip');if(cdc){togCDType(cdc.dataset.key,cdc.dataset.type,week.week,panel);return;}const cddb=e.target.closest('.cddb');if(cddb){togCDDone(cddb.dataset.key,week.week,panel);return;}});

function buildCard(key,day,ei){const ex=day.exercises[ei];const ds=ST[key];const sub=ds.sub[ei];const nm=sub==='sub1'&&ex.sub1?ex.sub1:sub==='sub2'&&ex.sub2?ex.sub2:ex.name;const subb=sub&&sub!=='orig';const card=document.createElement('div');card.className='ex-card'+(ds.done[ei]?' done':'');card.dataset.ei=ei;const hasInfo=ex.early_rpe||ex.last_rpe||ex.rest||ex.sub1||ex.sub2;const subOpts=[{id:'orig',label:ex.name},ex.sub1?{id:'sub1',label:ex.sub1}:null,ex.sub2?{id:'sub2',label:ex.sub2}:null].filter(Boolean);const subsH=subOpts.map(o=>`<button class="sc ${(o.id==='orig'&&!sub)||o.id===sub?'sa':''}" data-key="${key}" data-ei="${ei}" data-sub="${o.id}">${o.id==='orig'?'★ ':'↔ '}${o.label}</button>`).join('');card.innerHTML=`<div class="ct" data-key="${key}" data-ei="${ei}"><div class="cc"><svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L3.5 6.5L10 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="ex-name">${nm}${subb?'<span class="stag">SUB</span>':''}</div><div class="ib">${ex.technique}</div></div><div class="cm"><div class="mi"><div class="ml">Warm-up</div><div class="mv">${ex.warmup} sets</div></div><div class="mi"><div class="ml">Working</div><div class="mv">${ex.working} sets</div></div><div class="mi"><div class="ml">Reps</div><div class="mv">${ex.reps}</div></div></div>${hasInfo?`<div class="it" data-ei="${ei}"><span class="itl">RPE · REST · SUBS</span><span class="ita">▾</span></div><div class="ip"><div class="ir">${ex.early_rpe?`<div class="ic"><div class="icl">Early RPE</div><div class="icv rpe">${ex.early_rpe}</div></div>`:''}${ex.last_rpe?`<div class="ic"><div class="icl">Last RPE</div><div class="icv rpe">${ex.last_rpe}</div></div>`:''}${ex.rest?`<div class="ic"><div class="icl">Rest</div><div class="icv rv">${ex.rest}</div></div>`:''}</div>${subsH?`<div class="sr"><div class="sl">Select Exercise</div>${subsH}</div>`:''}</div>`:''}<div class="ss"><div class="ssl">WARM-UP SETS function renderCD(key,wn,panel){const slot=panel.querySelector(`#cd-${key}`);if(!slot)return;const cs=ST[key].cardio;const cnt=cdCount(wn);const lim=cnt>=3&&!cs.on;slot.innerHTML=`<div class="cds"><div class="cdhr"><div class="cdtitle">🏃 CARDIO</div><div class="cdcnt">This week: <strong>${cnt}/3</strong></div></div><div class="cdc ${cs.on?'on':''} ${cs.done?'cdn':''}"><div class="cdtr" data-key="${key}"><div class="cdpill"></div><div class="cdlbl"><div class="cdtl">${cs.on?'Cardio Day ✓':lim?'Limit reached (3/3)':'Add Cardio Today'}</div><div class="cdsub">${cs.on?(cs.done?'Completed':'Tap to remove'):lim?'Toggle off another day first':'Tap to schedule'}</div></div></div>${cs.on?`<div class="cdbody"><div class="cdtypes">${CT.map(t=>`<button class="cdchip ${cs.type===t?'sel':''}" data-key="${key}" data-type="${t}">${t}</button>`).join('')}</div><div class="cdfields"><div class="cdf"><div class="cdfl">Duration (min)</div><input class="cdi" type="number" inputmode="numeric" placeholder="30" value="${cs.duration}" data-key="${key}" data-field="duration"></div><div class="cdf"><div class="cdfl">Intensity (1-10)</div><input class="cdi" type="number" inputmode="numeric" placeholder="6" value="${cs.intensity}" data-key="${key}" data-field="intensity"></div><div class="cdf cdinf"><div class="cdfl">Notes</div><input class="cdi" type="text" placeholder="steady state, 130bpm..." value="${cs.notes}" data-key="${key}" data-field="notes"></div></div><button class="cddb ${cs.done?'comp':''}" data-key="${key}">${cs.done?'✓ CARDIO DONE':'LOG CARDIO DONE'}</button></div>`:''}</div></div>`;}

function getPD(di){const res=[];PROGRAM.forEach(wk=>{const tdays=wk.days.map((d,idx)=>({...d,di:idx})).filter(d=>!d.rest);const day=tdays[di];if(!day)return;const key=`w${wk.week}d${day.di}`;const ds=ST[key];if(!ds)return;day.exercises.forEach((ex,ei)=>{const sub=ds.sub?.[ei];const nm=sub==='sub1'&&ex.sub1?ex.sub1:sub==='sub2'&&ex.sub2?ex.sub2:ex.name;let row=res.find(r=>r.orig===ex.name);if(!row){row={orig:ex.name,nm,weeks:{}};res.push(row);}row.weeks[wk.week]=(ds.working[ei]||[]).map(s=>({weight:s.weight,reps:s.reps,logged:s.logged,note:s.note}));});});return res;}

badge">${maxS} sets</span>${maxW?`<span class="pebadge" style="color:var(--ac);border-color:rgba(200,245,66,.3)">PR: ${maxW}lbs</span>`:''}${maxE?`<span class="pebadge" style="color:#f0a500;border-color:rgba(240,165,0,.3)">e1RM: ${maxE}</span>`:''}</div><div class="ptw"><table class="pt"><thead><tr><th style="min-width:60px"></th>${Array.from({length:12},(_,i)=>`<th class="wth">WK ${i+1}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div></div>`;});

function doExport(){const rows=[['Week','Day','Exercise','Set','Weight','Reps','Note','e1RM']];PROGRAM.forEach(w=>{const tdays=w.days.map((d,di)=>({...d,di})).filter(d=>!d.rest);tdays.forEach((day,dIdx)=>{const key=`w${w.week}d${day.di}`;const ds=ST[key];if(!ds)return;day.exercises.forEach((ex,ei)=>{const sub=ds.sub?.[ei];const nm=sub==='sub1'&&ex.sub1?ex.sub1:sub==='sub2'&&ex.sub2?ex.sub2:ex.name;ds.working[ei].forEach((s,si)=>{if(!s.logged)return;const est=e1rm(s.weight,s.reps);rows.push([w.week,`Day ${dIdx+1}`,nm,si+1,s.weight||'',s.reps||'',s.note||'',est||'']);});});const c=ds.cardio;if(c.done)rows.push([w.week,`Day ${dIdx+1}`,'CARDIO','',c.duration||'','',`${c.type||''} RPE:${c.intensity||''}`,'']);});if(BW[w.week])rows.push([w.week,'','BODYWEIGHT','',BW[w.week],'lbs','','']);});const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='nippard-log.csv';a.click();}
</script>
